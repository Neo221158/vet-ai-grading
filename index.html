<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chatbots in Veterinary Ophthalmology — Expert Grading</title>
<style>
  :root{
    --bg:#eef1f6; --surface:#ffffff; --ink:#1c2330; --ink-soft:#4a5568;
    --line:#d7dde8; --primary:#1f6f6b; --primary-d:#155350; --primary-tint:#e3f1f0;
    --accent:#b4541f; --good:#1f6f6b;
    --radius:14px; --shadow:0 1px 3px rgba(20,30,50,.08),0 8px 24px rgba(20,30,50,.06);
    --maxw:1100px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 18px}
  header.topbar{position:sticky; top:0; z-index:20; background:rgba(255,255,255,.92);
    backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:var(--maxw); margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:14px}
  .brand{font-weight:700; font-size:15px; letter-spacing:.2px; color:var(--primary-d); white-space:nowrap}
  .progress{flex:1; height:8px; background:#dfe5ee; border-radius:99px; overflow:hidden}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--primary),#2a8f8a); border-radius:99px; transition:width .3s ease}
  .progress-label{font-size:12px; color:var(--ink-soft); white-space:nowrap; min-width:46px; text-align:right}
  main{padding:26px 0 132px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .pad{padding:24px}
  h1{font-size:24px; margin:0 0 6px; letter-spacing:-.01em}
  h2{font-size:19px; margin:0 0 10px; letter-spacing:-.01em}
  .muted{color:var(--ink-soft)}
  .eyebrow{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--primary); margin-bottom:6px}
  .field{margin:16px 0}
  label.lbl{display:block; font-weight:600; margin-bottom:6px; font-size:14px}
  input[type=text], input[type=email], input[type=number], textarea{
    width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:10px; font-size:15px;
    font-family:inherit; color:var(--ink); background:#fbfcfe; transition:border-color .15s, box-shadow .15s;}
  input:focus, textarea:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint)}
  textarea{min-height:80px; resize:vertical}
  .rate-grid{display:grid; grid-template-columns:1.15fr .95fr; gap:18px; align-items:start}
  .resp-card .resp-scroll{max-height:64vh; overflow:auto; padding-right:6px; white-space:pre-wrap; font-size:15px; color:#222b39}
  .qbanner{background:var(--primary-tint); border:1px solid #c9e4e2; color:var(--primary-d); border-radius:10px; padding:12px 14px; font-size:15px; margin-bottom:16px}
  .qbanner b{display:block; font-size:12px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:3px; color:var(--primary)}
  .chip{display:inline-block; background:var(--ink); color:#fff; font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px; letter-spacing:.04em}
  .metric{margin:0 0 18px}
  .metric .m-q{font-weight:600; font-size:14.5px; margin-bottom:8px}
  .metric .m-help{font-size:12.5px; color:var(--ink-soft); margin:-4px 0 8px}
  .scale{display:flex; gap:8px}
  .scale button{flex:1; min-height:48px; border:1.5px solid var(--line); background:#fff; border-radius:10px; font-size:16px; font-weight:700; color:var(--ink); cursor:pointer; transition:all .12s}
  .scale button:hover{border-color:var(--primary); background:var(--primary-tint)}
  .scale button[aria-pressed=true]{background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(31,111,107,.35)}
  .scale-ends{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-top:5px}
  .choices{display:flex; gap:8px; flex-wrap:wrap}
  .choices button{flex:1 1 auto; min-height:48px; padding:0 14px; border:1.5px solid var(--line); background:#fff; border-radius:10px; font-size:14.5px; font-weight:600; color:var(--ink); cursor:pointer; transition:all .12s}
  .choices button:hover{border-color:var(--primary); background:var(--primary-tint)}
  .choices button[aria-pressed=true]{background:var(--primary); border-color:var(--primary); color:#fff}
  .choices.harm button[data-v=Yes][aria-pressed=true]{background:var(--accent); border-color:var(--accent)}
  .navbar{position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.96); backdrop-filter:blur(8px); border-top:1px solid var(--line); z-index:20}
  .navbar-inner{max-width:var(--maxw); margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:12px}
  .btn{appearance:none; border:none; border-radius:11px; padding:13px 22px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .06s, background .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary); color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:#eef2f7; color:var(--ink)}
  .btn-ghost:hover{background:#e3e9f1}
  .btn[disabled]{opacity:.45; cursor:not-allowed}
  .nav-spacer{flex:1}
  .save-note{font-size:12px; color:var(--ink-soft)}
  .save-note b{color:var(--good)}
  .pill-ok{color:var(--good); font-weight:700}
  .banner-warn{background:#fcefe6; border:1px solid #f0c9ad; color:#8a3c12; border-radius:10px; padding:12px 14px; font-size:13.5px; margin-top:14px}
  @media (max-width:880px){ .rate-grid{grid-template-columns:1fr} .resp-card .resp-scroll{max-height:46vh} }
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">Vet-Ophthalmology AI Grading</div>
    <div class="progress" aria-hidden="true"><i id="bar"></i></div>
    <div class="progress-label" id="plabel">&nbsp;</div>
  </div>
</header>

<main><div class="wrap" id="root"></div></main>

<div class="navbar" id="navbar" style="display:none">
  <div class="navbar-inner">
    <button class="btn btn-ghost" id="backBtn">&larr; Back</button>
    <span class="save-note" id="saveNote">Progress saved <b>&#10003;</b></span>
    <div class="nav-spacer"></div>
    <button class="btn btn-primary" id="nextBtn">Next &rarr;</button>
  </div>
</div>

<script src="survey_data.js"></script>
<script>
/* ============ CONFIG ============ */
var ACCESS_CODE = "OFRI2026";
var SUBMIT_URL  = "https://script.google.com/macros/s/AKfycbylsRbw7Pb94HRhrgyzhUq6p-_rp_Pi0uQx5CbRFsYLLrBTRPRAMMlkkn-ESIL8lfMv/exec";
var STORAGE_KEY = "vetai_survey_v1";

var COMP_HELP = "Includes whether the relevant differential diagnoses were mentioned (the causes a clinician would seriously consider, including the can't-miss one), plus suggested tests, treatment direction, red-flag warnings, and signalment-appropriate guidance. NOTE: the chatbot was NOT asked for a most-likely diagnosis or a ranked differential — do not penalise lack of ranking; credit whether appropriate causes were raised, regardless of order.";

/* ============ BUILD STEPS ============ */
var steps = [{type:"welcome"}];
SURVEY_DATA.forEach(function(q){
  q.responses.forEach(function(r){ steps.push({type:"rate", q:q.num, question:q.question, letter:r.letter, text:r.text}); });
  steps.push({type:"best", q:q.num, question:q.question});
});
steps.push({type:"closing"});
steps.push({type:"review"});

/* ============ STATE ============ */
var state = load() || {graderId:"", email:"", answers:{}, idx:0, submitted:false};

function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; } }

/* ============ RENDER ============ */
var root=document.getElementById("root");
var navbar=document.getElementById("navbar");
var backBtn=document.getElementById("backBtn");
var nextBtn=document.getElementById("nextBtn");

function setProgress(){
  var pct = Math.round((state.idx)/(steps.length-1)*100);
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("plabel").textContent = pct + "%";
}
function render(){
  var step=steps[state.idx];
  setProgress();
  navbar.style.display = (step.type==="welcome") ? "none" : "block";
  backBtn.disabled = (state.idx<=1);
  if(step.type==="welcome") return renderWelcome();
  if(step.type==="rate") return renderRate(step);
  if(step.type==="best") return renderBest(step);
  if(step.type==="closing") return renderClosing();
  if(step.type==="review") return renderReview();
}
function renderWelcome(){
  root.innerHTML =
   '<div class="card pad" style="max-width:680px;margin:24px auto">'
   +'<div class="eyebrow">Expert Evaluation Study</div>'
   +'<h1>AI Chatbots in Veterinary Ophthalmology</h1>'
   +'<p class="muted">Thank you for grading. You will see <b>10 owner questions</b>; each is followed by <b>three blinded chatbot responses</b> (Chatbot A, B, C), one per screen. Score each response, then choose the one you liked most for that question.</p>'
   +'<ul class="muted" style="font-size:14px">'
   +'<li>Each response is on its own screen — read it, score it, click <b>Next</b>.</li>'
   +'<li>Your progress saves automatically in this browser. You can close the tab and return to continue.</li>'
   +'<li>You can go <b>Back</b> at any time to revise earlier answers.</li>'
   +'<li>Estimated time: ~50–70 minutes. Please score independently.</li></ul>'
   +'<div class="field"><label class="lbl">Your name or assigned grader ID</label><input type="text" id="w_id" value="'+esc(state.graderId)+'" placeholder="e.g., Dr. Surname or G-03"></div>'
   +'<div class="field"><label class="lbl">Email</label><input type="email" id="w_email" value="'+esc(state.email)+'" placeholder="you@example.com"></div>'
   +'<div class="field"><label class="lbl">Access code</label><input type="text" id="w_code" placeholder="provided by the study team"></div>'
   +'<div id="w_err" style="color:var(--accent);font-size:13.5px;min-height:18px"></div>'
   +'<button class="btn btn-primary" id="startBtn" style="width:100%;margin-top:6px">Begin grading &rarr;</button>'
   +'</div>';
  document.getElementById("startBtn").onclick=function(){
    var id=valOf("w_id"), em=valOf("w_email"), code=valOf("w_code");
    var err=document.getElementById("w_err");
    if(!id){err.textContent="Please enter your name or grader ID."; return;}
    if(!em||em.indexOf("@")<0){err.textContent="Please enter a valid email."; return;}
    if(code.trim()!==ACCESS_CODE){err.textContent="Incorrect access code."; return;}
    state.graderId=id; state.email=em; state.idx=1; save(); render(); scrollTop();
  };
}
function renderRate(step){
  var p="q"+step.q+"_"+step.letter+"_";
  var a=state.answers;
  root.innerHTML =
    '<div class="qbanner"><b>Question '+step.q+' of 10 — owner asks</b>'+esc(step.question)+'</div>'
   +'<div class="rate-grid">'
   +'  <div class="card pad resp-card">'
   +'     <span class="chip">Chatbot '+step.letter+'</span>'
   +'     <h2 style="margin-top:10px">Response</h2>'
   +'     <div class="resp-scroll" id="respText"></div>'
   +'  </div>'
   +'  <div class="card pad">'
   +'     <h2>Score this response</h2>'
   +     scaleHTML(p+"accuracy","Accuracy","wrong","fully accurate",a)
   +     scaleHTML(p+"comprehensiveness","Comprehensiveness","misses key info","covers DDs / tests / treatment",a,COMP_HELP)
   +     scaleHTML(p+"clarity","Clarity for a pet owner","confusing","clear",a)
   +     choiceHTML(p+"harm_flag","Could a pet owner acting on this response harm the animal?",["Yes","No"],a,"harm")
   +     '<div class="metric" id="harmNoteWrap" style="display:'+(a[p+"harm_flag"]==="Yes"?"block":"none")+'"><div class="m-q">If yes, briefly describe the risk</div><textarea id="hn" placeholder="One short sentence">'+esc(a[p+"harm_note"]||"")+'</textarea></div>'
   +     choiceHTML(p+"triage","What triage urgency did this response convey?",["Urgent (24–48 h)","Within days (this week)","Routine (when convenient)"],a,"triage")
   +'  </div>'
   +'</div>';
  document.getElementById("respText").textContent = step.text;
  wireScale(p+"accuracy"); wireScale(p+"comprehensiveness"); wireScale(p+"clarity");
  wireChoice(p+"harm_flag", function(v){ document.getElementById("harmNoteWrap").style.display = (v==="Yes")?"block":"none"; });
  wireChoice(p+"triage");
  var hn=document.getElementById("hn"); if(hn){ hn.oninput=function(){ state.answers[p+"harm_note"]=hn.value; save(); }; }
}
function renderBest(step){
  var f="q"+step.q+"_best"; var a=state.answers;
  root.innerHTML =
    '<div class="qbanner"><b>Question '+step.q+' of 10 — owner asks</b>'+esc(step.question)+'</div>'
   +'<div class="card pad" style="max-width:680px">'
   +'  <h2>Overall — which response did you like most?</h2>'
   +'  <p class="m-help">Considering accuracy, safety, and usefulness to a worried pet owner. You can use <b>Back</b> to re-read Chatbot A, B, and C.</p>'
   +   choiceHTML(f,"",["Chatbot A","Chatbot B","Chatbot C"],a,"best")
   +'</div>';
  wireChoice(f);
}
function renderClosing(){
  var a=state.answers;
  root.innerHTML =
    '<div class="card pad" style="max-width:680px">'
   +'<h2>Almost done</h2>'
   +'<div class="field"><label class="lbl">Any general comments (optional)</label><textarea id="gn" placeholder="Comments about the questions, responses, or process. Please do NOT speculate about which AI produced which response.">'+esc(a["global_notes"]||"")+'</textarea></div>'
   +'<div class="field"><label class="lbl">Approximate total time spent (minutes, optional)</label><input type="number" id="tm" value="'+esc(a["time_spent_minutes"]||"")+'" placeholder="e.g., 55"></div>'
   +'</div>';
  document.getElementById("gn").oninput=function(){ state.answers["global_notes"]=this.value; save(); };
  document.getElementById("tm").oninput=function(){ state.answers["time_spent_minutes"]=this.value; save(); };
}
function renderReview(){
  var total=0, done=0;
  SURVEY_DATA.forEach(function(q){
    ["A","B","C"].forEach(function(L){
      ["accuracy","comprehensiveness","clarity","harm_flag","triage"].forEach(function(m){
        total++; var v=state.answers["q"+q.num+"_"+L+"_"+m]; if(v!=null && v!=="") done++;
      });
    });
    total++; if(state.answers["q"+q.num+"_best"]) done++;
  });
  var complete = (done===total);
  root.innerHTML =
    '<div class="card pad" style="max-width:680px">'
   +'<h2>Review &amp; submit</h2>'
   +'<p class="muted">Required items completed: <span class="pill-ok">'+done+' / '+total+'</span></p>'
   +(complete? '' : '<div class="banner-warn">Some required items are still blank. Use <b>Back</b> to complete them — the count above will reach 100%.</div>')
   +'<p class="muted" style="font-size:13.5px;margin-top:14px">Grader: <b>'+esc(state.graderId)+'</b> &middot; '+esc(state.email)+'</p>'
   +'<button class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:8px" '+(complete?'':'disabled')+'>Submit my scores</button>'
   +'<button class="btn btn-ghost" id="dlBtn" style="width:100%;margin-top:10px">Download a copy of my answers (backup)</button>'
   +'<div id="subMsg" style="margin-top:14px;font-size:14px"></div>'
   +'</div>';
  document.getElementById("dlBtn").onclick=downloadBackup;
  var sb=document.getElementById("submitBtn"); if(sb) sb.onclick=submitAll;
  if(state.submitted){
    if(sb){ sb.disabled=true; sb.textContent="Already submitted"; }
    document.getElementById("subMsg").innerHTML='<span class="pill-ok">Your scores were already recorded. Thank you — you may close this tab.</span>';
  }
}
/* ============ WIDGETS ============ */
function scaleHTML(field,q,lo,hi,a,help){
  var sel=a[field], b="";
  for(var i=1;i<=5;i++){ b+='<button type="button" data-v="'+i+'" aria-pressed="'+(String(sel)===String(i))+'">'+i+'</button>'; }
  return '<div class="metric" data-field="'+field+'"><div class="m-q">'+q+'</div>'
    +(help?'<div class="m-help">'+help+'</div>':'')
    +'<div class="scale">'+b+'</div>'
    +'<div class="scale-ends"><span>1 · '+lo+'</span><span>'+hi+' · 5</span></div></div>';
}
function choiceHTML(field,q,opts,a,kind){
  var sel=a[field], b="";
  opts.forEach(function(o){ b+='<button type="button" data-v="'+esc(o)+'" aria-pressed="'+(sel===o)+'">'+esc(o)+'</button>'; });
  return '<div class="metric" data-field="'+field+'">'+(q?'<div class="m-q">'+q+'</div>':'')+'<div class="choices '+(kind||"")+'">'+b+'</div></div>';
}
function wireScale(field){
  var box=document.querySelector('[data-field="'+field+'"] .scale'); if(!box) return;
  box.querySelectorAll("button").forEach(function(btn){
    btn.onclick=function(){
      state.answers[field]=btn.getAttribute("data-v");
      box.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-pressed", x===btn);});
      save();
    };
  });
}
function wireChoice(field,cb){
  var box=document.querySelector('[data-field="'+field+'"] .choices'); if(!box) return;
  box.querySelectorAll("button").forEach(function(btn){
    btn.onclick=function(){
      var v=btn.getAttribute("data-v");
      state.answers[field]=v;
      box.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-pressed", x===btn);});
      save(); if(cb) cb(v);
    };
  });
}
/* ============ NAV ============ */
function validateCurrent(){
  var step=steps[state.idx];
  if(step.type==="rate"){
    var p="q"+step.q+"_"+step.letter+"_", a=state.answers;
    var need=["accuracy","comprehensiveness","clarity","harm_flag","triage"];
    for(var i=0;i<need.length;i++){ if(a[p+need[i]]==null||a[p+need[i]]===""){ return "Please answer all items before continuing."; } }
    if(a[p+"harm_flag"]==="Yes" && !(a[p+"harm_note"]||"").trim()){ return "You flagged possible harm — please add one short sentence describing the risk."; }
  }
  if(step.type==="best"){ if(!state.answers["q"+step.q+"_best"]) return "Please choose the response you liked most."; }
  return null;
}
nextBtn.onclick=function(){
  var err=validateCurrent();
  if(err){ alert(err); return; }
  if(state.idx<steps.length-1){ state.idx++; save(); render(); scrollTop(); }
};
backBtn.onclick=function(){ if(state.idx>1){ state.idx--; save(); render(); scrollTop(); } };
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }
/* ============ SUBMIT ============ */
function canonicalOrder(){
  var order=["graderId","email","submittedAt"];
  SURVEY_DATA.forEach(function(q){
    ["A","B","C"].forEach(function(L){
      ["accuracy","comprehensiveness","clarity","harm_flag","harm_note","triage"].forEach(function(m){ order.push("q"+q.num+"_"+L+"_"+m); });
    });
    order.push("q"+q.num+"_best");
  });
  order.push("global_notes","time_spent_minutes");
  return order;
}
function buildPayload(){
  var rec={graderId:state.graderId, email:state.email, submittedAt:new Date().toISOString()};
  Object.keys(state.answers).forEach(function(k){ rec[k]=state.answers[k]; });
  return {order:canonicalOrder(), record:rec};
}
function submitAll(){
  var msg=document.getElementById("subMsg");
  var btn=document.getElementById("submitBtn");
  if(state.submitted){ msg.innerHTML='<span class="pill-ok">Your scores were already recorded. There is no need to submit again.</span>'; return; }
  if(state.sending){ return; }
  var payload=buildPayload();
  if(SUBMIT_URL.indexOf("PASTE_")===0){
    msg.innerHTML='<span style="color:var(--accent)">The submission URL has not been set yet. Your answers are saved in this browser; please use the backup download. (Study team: set SUBMIT_URL.)</span>';
    return;
  }
  state.sending=true; if(btn){btn.disabled=true;} msg.innerHTML="Submitting…";
  fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
   .then(function(){
      state.submitted=true; state.sending=false; save();
      if(btn){btn.textContent="Already submitted";}
      msg.innerHTML='<span class="pill-ok">Thank you. Your scores have been recorded.</span> Please do not discuss your scores with other graders. You may keep a backup copy below.';
   })
   .catch(function(){
      state.sending=false; if(btn){btn.disabled=false;}
      msg.innerHTML='<span style="color:var(--accent)">Submission could not be confirmed. Please use the backup download and send the file to the study team.</span>';
   });
}
function downloadBackup(){
  var payload=buildPayload();
  var blob=new Blob([JSON.stringify(payload.record,null,2)],{type:"application/json"});
  var u=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=u; a.download="vetai_grading_"+(state.graderId||"grader").replace(/[^a-z0-9]/gi,"_")+".json"; a.click();
  URL.revokeObjectURL(u);
}
/* ============ UTIL ============ */
function valOf(id){ var el=document.getElementById(id); return el?el.value.trim():""; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

render();
</script>
</body>
</html>
