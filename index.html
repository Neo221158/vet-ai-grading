<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Chatbots in Veterinary Ophthalmology — Expert Grading</title>
<style>
  :root{
    --bg:#eef1f6; --surface:#ffffff; --ink:#1c2330; --ink-soft:#4a5568;
    --line:#d7dde8; --primary:#1f6f6b; --primary-d:#155350; --primary-tint:#e3f1f0;
    --accent:#b4541f; --good:#1f6f6b;
    --radius:14px; --shadow:0 1px 3px rgba(20,30,50,.08),0 8px 24px rgba(20,30,50,.06);
    --maxw:1100px;
    --resp-size:15px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 18px}
  header.topbar{position:sticky; top:0; z-index:20; background:rgba(255,255,255,.92);
    backdrop-filter:saturate(1.4) blur(8px); border-bottom:1px solid var(--line);}
  .topbar-inner{max-width:var(--maxw); margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:14px}
  .brand{font-weight:700; font-size:15px; letter-spacing:.2px; color:var(--primary-d); white-space:nowrap}
  .progress{flex:1; height:8px; background:#dfe5ee; border-radius:99px; overflow:hidden}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--primary),#2a8f8a); border-radius:99px; transition:width .3s ease}
  .progress-label{font-size:12px; color:var(--ink-soft); white-space:nowrap; min-width:46px; text-align:right}
  main{padding:26px 0 132px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
  .pad{padding:24px}
  h1{font-size:24px; margin:0 0 6px; letter-spacing:-.01em}
  h2{font-size:19px; margin:0 0 10px; letter-spacing:-.01em}
  .muted{color:var(--ink-soft)}
  .eyebrow{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--primary); margin-bottom:6px}
  .field{margin:16px 0}
  label.lbl{display:block; font-weight:600; margin-bottom:6px; font-size:14px}
  input[type=text], input[type=email], input[type=number], textarea{
    width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:10px; font-size:15px;
    font-family:inherit; color:var(--ink); background:#fbfcfe; transition:border-color .15s, box-shadow .15s;}
  input:focus, textarea:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-tint)}
  textarea{min-height:80px; resize:vertical}
  .rate-grid{display:grid; grid-template-columns:1.1fr 1fr; gap:18px; align-items:start}
  .resp-card .resp-scroll{max-height:66vh; overflow:auto; padding-right:10px; font-size:var(--resp-size); line-height:1.65; color:#222b39}
  /* rich response content (faithful to the original chatbot formatting) */
  .resp-content p{margin:0 0 11px}
  .resp-content h4{font-size:calc(var(--resp-size) + 2px); font-weight:700; color:var(--ink); line-height:1.3; margin:17px 0 7px}
  .resp-content ul, .resp-content ol{margin:0 0 12px; padding-left:24px}
  .resp-content ul{list-style:disc}
  .resp-content ol{list-style:decimal}
  .resp-content li{margin:0 0 5px; padding-left:3px}
  .resp-content strong{color:var(--ink); font-weight:700}
  .resp-content > :first-child{margin-top:0}
  .resp-content > :last-child{margin-bottom:0}
  /* BOLD question banner — solid deep-teal header (replaces the old light-green tint) */
  .qbanner{background:linear-gradient(135deg,var(--primary-d),var(--primary)); color:#fff; border-radius:12px;
    padding:15px 18px; margin-bottom:18px; box-shadow:0 3px 12px rgba(21,83,80,.28)}
  .qb-label{display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#c6e8e5; margin-bottom:5px}
  .qb-text{display:block; font-size:calc(var(--resp-size) + 1px); font-weight:600; line-height:1.42}
  .textsize{display:flex; align-items:center; gap:5px}
  .textsize button{width:34px; height:30px; border:1.5px solid var(--line); background:#fff; border-radius:8px; cursor:pointer; color:var(--ink); font-weight:700; line-height:1; padding:0; transition:all .12s}
  .textsize button:hover{border-color:var(--primary); background:var(--primary-tint)}
  .textsize button:disabled{opacity:.4; cursor:not-allowed}
  .textsize .ts-sm{font-size:12px}
  .textsize .ts-lg{font-size:17px}
  .textsize .ts-reset{font-size:11px; width:auto; padding:0 8px; color:var(--ink-soft)}
  .chip{display:inline-block; background:var(--ink); color:#fff; font-size:12px; font-weight:700; padding:3px 10px; border-radius:99px; letter-spacing:.04em}
  .metric{margin:0 0 18px}
  .metric .m-q{font-weight:600; font-size:14.5px; margin-bottom:6px}
  .metric .m-help{font-size:12.5px; color:var(--ink-soft); margin:-2px 0 8px}
  .m-help .help-lead{font-weight:600; color:var(--ink); margin-bottom:4px}
  .m-help ul.help-list{margin:0; padding-left:17px}
  .m-help ul.help-list li{margin:2px 0; line-height:1.45}
  .m-help ul.help-list li.dont{color:var(--accent); list-style:none; margin-left:-13px}
  .m-help ul.help-list li.dont::before{content:"✗ "; font-weight:700}
  .metric.sub{margin-left:14px; padding-left:14px; border-left:3px solid var(--primary-tint)}
  /* 1–10 scale */
  .scale{display:grid; grid-template-columns:repeat(10,1fr); gap:5px}
  .scale button{min-height:44px; border:1.5px solid var(--line); background:#fff; border-radius:9px; font-size:15px; font-weight:700; color:var(--ink); cursor:pointer; transition:all .12s; padding:0}
  .scale button:hover{border-color:var(--primary); background:var(--primary-tint)}
  .scale button[aria-pressed=true]{background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(31,111,107,.35)}
  .scale-ends{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-top:5px}
  @media (max-width:560px){ .scale{grid-template-columns:repeat(5,1fr)} }
  .choices{display:flex; gap:8px; flex-wrap:wrap}
  .choices button{flex:1 1 auto; min-height:46px; padding:0 14px; border:1.5px solid var(--line); background:#fff; border-radius:10px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; transition:all .12s}
  .choices button:hover{border-color:var(--primary); background:var(--primary-tint)}
  .choices button[aria-pressed=true]{background:var(--primary); border-color:var(--primary); color:#fff}
  .choices.harm button[data-v=Yes][aria-pressed=true]{background:var(--accent); border-color:var(--accent)}
  .choices.narrow button{flex:0 1 auto; min-width:64px}
  .navbar{position:fixed; left:0; right:0; bottom:0; background:rgba(255,255,255,.96); backdrop-filter:blur(8px); border-top:1px solid var(--line); z-index:20}
  .navbar-inner{max-width:var(--maxw); margin:0 auto; padding:12px 18px; display:flex; align-items:center; gap:12px}
  .btn{appearance:none; border:none; border-radius:11px; padding:13px 22px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:transform .06s, background .15s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--primary); color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-ghost{background:#eef2f7; color:var(--ink)}
  .btn-ghost:hover{background:#e3e9f1}
  .btn[disabled]{opacity:.45; cursor:not-allowed}
  .nav-spacer{flex:1}
  .save-note{font-size:12px; color:var(--ink-soft); transition:color .2s}
  .save-note b{color:var(--good)}
  .save-note.flash{color:var(--good); font-weight:600}
  .btn-save{background:#eef2f7; color:var(--ink); border:1.5px solid var(--line); padding:10px 16px}
  .btn-save:hover{background:#e3e9f1; border-color:var(--primary)}
  .btn-save.saved{background:var(--good,#1f9d57); color:#fff; border-color:var(--good,#1f9d57)}
  @media (max-width:560px){ .save-note{display:none} .btn-save{padding:10px 12px} }
  .pill-ok{color:var(--good); font-weight:700}
  .banner-warn{background:#fcefe6; border:1px solid #f0c9ad; color:#8a3c12; border-radius:10px; padding:12px 14px; font-size:13.5px; margin-top:14px}
  .intro-note{background:var(--primary-tint); border:1px solid #c9e4e2; color:var(--primary-d); border-radius:10px; padding:12px 14px; font-size:13.5px; margin-bottom:18px}
  /* confirm modal */
  .modal-overlay{position:fixed; inset:0; background:rgba(20,30,50,.55); display:none; align-items:center; justify-content:center; z-index:50; padding:20px}
  .modal-box{background:#fff; border-radius:16px; max-width:560px; width:100%; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-title{font-size:18px; font-weight:700; margin-bottom:8px}
  .modal-body{font-size:15px; color:var(--ink-soft); margin-bottom:20px; line-height:1.5}
  .modal-body b{color:var(--ink)}
  .modal-resp{max-height:46vh; overflow:auto; margin-top:10px; padding:14px 16px; border:1.5px solid var(--line); border-radius:10px; background:#f8fafc; color:#222b39; font-size:14.5px; line-height:1.65; text-align:left}
  .modal-actions{display:flex; gap:10px}
  .modal-actions .btn{flex:1}
  @media (max-width:880px){ .rate-grid{grid-template-columns:1fr} .resp-card .resp-scroll{max-height:42vh} }
</style>
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">Vet-Ophthalmology AI Grading</div>
    <div class="progress" aria-hidden="true"><i id="bar"></i></div>
    <div class="progress-label" id="plabel">&nbsp;</div>
    <div class="textsize" role="group" aria-label="Text size">
      <button class="ts-sm" id="tsDown" title="Smaller text" aria-label="Smaller text">A&minus;</button>
      <button class="ts-reset" id="tsReset" title="Reset text size" aria-label="Reset text size">Reset</button>
      <button class="ts-lg" id="tsUp" title="Larger text" aria-label="Larger text">A+</button>
    </div>
  </div>
</header>

<main><div class="wrap" id="root"></div></main>

<div class="navbar" id="navbar" style="display:none">
  <div class="navbar-inner">
    <button class="btn btn-ghost" id="backBtn">&larr; Back</button>
    <button class="btn btn-save" id="saveBtn" title="Save your progress now">&#128190; Save</button>
    <span class="save-note" id="saveNote">Progress saves automatically</span>
    <div class="nav-spacer"></div>
    <button class="btn btn-primary" id="nextBtn">Next &rarr;</button>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-title">Confirm your choice</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="modalCancel">Go back</button>
      <button class="btn btn-primary" id="modalOk">Yes, that's my pick</button>
    </div>
  </div>
</div>

<script src="survey_data.js"></script>
<script>
/* ============ CONFIG ============ */
var ACCESS_CODE = "OFRI2026";
var SUBMIT_URL  = "https://script.google.com/macros/s/AKfycby7n_PJmPWQL1YwQewoikg78tQzV6r3nfuLvWPjHx3dB4I9X3Z6CHY2_feEut1hhQvN/exec";
var STORAGE_KEY = "vetai_survey_v3";
var NQ = (typeof SURVEY_DATA !== "undefined") ? SURVEY_DATA.length : 11;

var ACC_HELP = "<div class='help-lead'>Is what the answer says clinically correct?</div>"
  + "<ul class='help-list'>"
  + "<li>Realistic differentials for this breed / age / species</li>"
  + "<li>Correct tests, treatments, drugs and doses</li>"
  + "<li>No invented (\"hallucinated\") or outdated claims</li>"
  + "<li class='dont'>Not whether it covers enough — a brief answer can still be fully accurate (coverage is Comprehensiveness)</li>"
  + "</ul>";
var COMP_HELP = "<div class='help-lead'>How complete is the practical guidance?</div>"
  + "<ul class='help-list'>"
  + "<li>Names the tests the owner should expect</li>"
  + "<li>Gives treatment direction (medical vs surgical; one-off vs lifelong)</li>"
  + "<li>Flags red-flag warning signs to watch for</li>"
  + "<li>Fits the breed / age / species</li>"
  + "<li class='dont'>Not the list of possible diagnoses (scored below), and not just length — longer &ne; more complete</li>"
  + "</ul>";
var CLAR_HELP = "<div class='help-lead'>Is it easy for a non-vet owner to understand and act on?</div>"
  + "<ul class='help-list'>"
  + "<li>Plain language and logical structure</li>"
  + "<li>Sensible length, clean formatting</li>"
  + "<li>The owner can tell what to do next</li>"
  + "<li class='dont'>Not whether it's correct — a clearly written answer can still be wrong</li>"
  + "</ul>";
var TRIAGE_OPTS = ["Urgent (24–48 h)","Within days (this week)","Routine (when convenient)"];
var TRIAGE_OPTS_CONVEYED = TRIAGE_OPTS.concat(["Not clearly stated"]);

/* ============ BUILD STEPS ============ */
var steps = [{type:"welcome"}];
SURVEY_DATA.forEach(function(q){
  q.responses.forEach(function(r){ steps.push({type:"rate", q:q.num, question:q.question, letter:r.letter, text:r.text, html:r.html}); });
  steps.push({type:"best", q:q.num, question:q.question});
});
steps.push({type:"closing"});
steps.push({type:"review"});

/* ============ STATE ============ */
var state = load() || {graderId:"", email:"", answers:{}, idx:0, submitted:false};

function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function load(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }catch(e){ return null; } }

/* Manual Save: reuses the same save() as autosave — single persistence path,
   just adds a visible confirmation + last-saved timestamp for reassurance. */
var saveFlashTimer=null;
function saveNow(){
  save();
  var t=new Date();
  var hh=("0"+t.getHours()).slice(-2), mm=("0"+t.getMinutes()).slice(-2);
  var note=document.getElementById("saveNote");
  var btn=document.getElementById("saveBtn");
  if(note){
    note.innerHTML='<b>&#10003;</b> Progress saved &middot; Last saved at '+hh+':'+mm;
    note.classList.add("flash");
  }
  if(btn){ btn.classList.add("saved"); btn.innerHTML='&#10003; Saved'; }
  if(saveFlashTimer) clearTimeout(saveFlashTimer);
  saveFlashTimer=setTimeout(function(){
    if(note) note.classList.remove("flash");
    if(btn){ btn.classList.remove("saved"); btn.innerHTML='&#128190; Save'; }
  },2200);
}
function wireSaveButton(){
  var btn=document.getElementById("saveBtn");
  if(btn) btn.onclick=saveNow;
}

/* ============ TEXT SIZE ============ */
var TEXT_MIN=13, TEXT_MAX=24, TEXT_DEFAULT=15, TEXT_STEP=1.5;
function applyTextScale(){
  var px=state.textPx; if(typeof px!=="number"||isNaN(px)){ px=TEXT_DEFAULT; }
  px=Math.max(TEXT_MIN, Math.min(TEXT_MAX, px)); state.textPx=px;
  document.documentElement.style.setProperty("--resp-size", px+"px");
  var down=document.getElementById("tsDown"), up=document.getElementById("tsUp");
  if(down) down.disabled = (px<=TEXT_MIN);
  if(up)   up.disabled   = (px>=TEXT_MAX);
}
function bumpTextScale(delta){
  var px=(typeof state.textPx==="number"&&!isNaN(state.textPx))?state.textPx:TEXT_DEFAULT;
  state.textPx=px+delta; applyTextScale(); save();
}
function wireTextSize(){
  var down=document.getElementById("tsDown"), up=document.getElementById("tsUp"), reset=document.getElementById("tsReset");
  if(down) down.onclick=function(){ bumpTextScale(-TEXT_STEP); };
  if(up)   up.onclick  =function(){ bumpTextScale(TEXT_STEP); };
  if(reset)reset.onclick=function(){ state.textPx=TEXT_DEFAULT; applyTextScale(); save(); };
}

/* ============ RENDER ============ */
var root=document.getElementById("root");
var navbar=document.getElementById("navbar");
var backBtn=document.getElementById("backBtn");
var nextBtn=document.getElementById("nextBtn");

function setProgress(){
  var pct = Math.round((state.idx)/(steps.length-1)*100);
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("plabel").textContent = pct + "%";
}
function qbanner(step){
  return '<div class="qbanner"><span class="qb-label">Question '+step.q+' of '+NQ+' — owner asks</span><span class="qb-text">'+esc(step.question)+'</span></div>';
}
function render(){
  var step=steps[state.idx];
  setProgress();
  navbar.style.display = (step.type==="welcome") ? "none" : "block";
  backBtn.disabled = (state.idx<=1);
  if(step.type==="welcome") return renderWelcome();
  if(step.type==="rate") return renderRate(step);
  if(step.type==="best") return renderBest(step);
  if(step.type==="closing") return renderClosing();
  if(step.type==="review") return renderReview();
}
function renderWelcome(){
  root.innerHTML =
   '<div class="card pad" style="max-width:680px;margin:24px auto">'
   +'<div class="eyebrow">Expert Evaluation Study</div>'
   +'<h1>AI Chatbots in Veterinary Ophthalmology</h1>'
   +'<p class="muted">Thank you for grading. You will see <b>'+NQ+' owner questions</b>. For each one you will score <b>three blinded chatbot responses</b> (Chatbot A, B, C) one per screen, and finally choose the response you liked most.</p>'
   +'<ul class="muted" style="font-size:14px">'
   +'<li>Read each blinded response and score it on its own screen.</li>'
   +'<li>Your progress saves automatically in this browser. You can close the tab and return to continue.</li>'
   +'<li>You can go <b>Back</b> at any time to revise earlier answers.</li>'
   +'<li>Estimated time: ~75–90 minutes. Please score independently and do not try to identify the models.</li></ul>'
   +'<div class="field"><label class="lbl">Your name or assigned grader ID</label><input type="text" id="w_id" value="'+esc(state.graderId)+'" placeholder="e.g., Dr. Surname or G-03"></div>'
   +'<div class="field"><label class="lbl">Email</label><input type="email" id="w_email" value="'+esc(state.email)+'" placeholder="you@example.com"></div>'
   +'<div class="field"><label class="lbl">Access code</label><input type="text" id="w_code" placeholder="provided by the study team"></div>'
   +'<div id="w_err" style="color:var(--accent);font-size:13.5px;min-height:18px"></div>'
   +'<button class="btn btn-primary" id="startBtn" style="width:100%;margin-top:6px">Begin grading &rarr;</button>'
   +'</div>';
  document.getElementById("startBtn").onclick=function(){
    var id=valOf("w_id"), em=valOf("w_email"), code=valOf("w_code");
    var err=document.getElementById("w_err");
    if(!id){err.textContent="Please enter your name or grader ID."; return;}
    if(!em||em.indexOf("@")<0){err.textContent="Please enter a valid email."; return;}
    if(code.trim()!==ACCESS_CODE){err.textContent="Incorrect access code."; return;}
    state.graderId=id; state.email=em; state.idx=1; save(); render(); scrollTop();
  };
}
function renderRate(step){
  var p="q"+step.q+"_"+step.letter+"_";
  var a=state.answers;
  var needsSpec = (a[p+"specialist_needed"]==="Yes");
  root.innerHTML =
    qbanner(step)
   +'<div class="rate-grid">'
   +'  <div class="card pad resp-card">'
   +'     <span class="chip">Chatbot '+step.letter+'</span>'
   +'     <h2 style="margin-top:10px">Response</h2>'
   +'     <div class="resp-scroll resp-content" id="respText"></div>'
   +'  </div>'
   +'  <div class="card pad">'
   +'     <h2>Score this response</h2>'
   +     scaleHTML(p+"accuracy","Accuracy","wrong","fully accurate",a,ACC_HELP)
   +     scaleHTML(p+"comprehensiveness","Comprehensiveness","misses key info","thorough workup",a,COMP_HELP)
   +     scaleHTML(p+"clarity","Clarity for a pet owner","confusing","clear",a,CLAR_HELP)
   +     choiceHTML(p+"most_likely_dd_first","Does the most likely diagnosis of this patient (in your opinion) appear first in the list proposed by the chatbot?",["Yes","No"],a,"narrow","Judge against your own most-likely diagnosis for this case. If it does not appear first — or is not mentioned at all — answer No.")
   +     choiceHTML(p+"triage_conveyed","What triage urgency did THIS response convey to the owner? (What it said — not whether that is correct.)",TRIAGE_OPTS_CONVEYED,a,"triage")
   +     choiceHTML(p+"specialist_needed","In your judgment, does this case warrant an ophthalmology specialist?",["Yes","No"],a,"narrow")
   +     (needsSpec
        ? choiceHTML(p+"referral_mentioned","Did this response recommend seeing an ophthalmology specialist / referral?",["Yes","No"],a,"narrow","You judged this case needs a specialist — did this chatbot route the owner there?")
        : '')
   +     choiceHTML(p+"harm_flag","Could a pet owner acting on this response harm the animal?",["Yes","No","Unsure"],a,"harm","e.g. a contraindicated treatment, false reassurance for an emergency, or delaying urgent care.")
   +'  </div>'
   +'</div>';
  document.getElementById("respText").innerHTML = step.html || esc(step.text||"");
  wireScale(p+"accuracy"); wireScale(p+"comprehensiveness"); wireScale(p+"clarity");
  wireChoice(p+"most_likely_dd_first");
  wireChoice(p+"triage_conveyed");
  wireChoice(p+"specialist_needed", function(v){
    if(v==="No"){ delete state.answers[p+"referral_mentioned"]; save(); }
    render();   /* re-render so the referral sub-question shows/hides */
  });
  if(needsSpec) wireChoice(p+"referral_mentioned");
  wireChoice(p+"harm_flag");
}
function renderBest(step){
  var f="q"+step.q+"_best"; var fw="q"+step.q+"_best_why"; var a=state.answers;
  root.innerHTML =
    qbanner(step)
   +'<div class="card pad" style="max-width:720px">'
   +'  <h2>Overall — which response did you like most?</h2>'
   +'  <p class="m-help">Considering accuracy, safety, and usefulness to a worried pet owner. You can use <b>Back</b> to re-read Chatbot A, B, and C.</p>'
   +   choiceHTML(f,"",["Chatbot A","Chatbot B","Chatbot C"],a,"best")
   +'  <div class="field" style="margin-top:18px"><label class="lbl">In 2–3 sentences, why? <span class="muted" style="font-weight:400">(optional)</span></label>'
   +'    <textarea id="bw" placeholder="What made this response the best one for this owner?">'+esc(a[fw]||"")+'</textarea></div>'
   +'</div>';
  wireBestChoice(f, step);
  var bw=document.getElementById("bw"); if(bw){ bw.oninput=function(){ state.answers[fw]=bw.value; save(); }; }
}
function renderClosing(){
  var a=state.answers;
  root.innerHTML =
    '<div class="card pad" style="max-width:680px">'
   +'<h2>Almost done</h2>'
   +'<div class="field"><label class="lbl">Any general comments (optional)</label><textarea id="gn" placeholder="Comments about the questions, responses, or process. Please do NOT speculate about which AI produced which response.">'+esc(a["global_notes"]||"")+'</textarea></div>'
   +'<div class="field"><label class="lbl">Approximate total time spent (minutes, optional)</label><input type="number" id="tm" value="'+esc(a["time_spent_minutes"]||"")+'" placeholder="e.g., 85"></div>'
   +'</div>';
  document.getElementById("gn").oninput=function(){ state.answers["global_notes"]=this.value; save(); };
  document.getElementById("tm").oninput=function(){ state.answers["time_spent_minutes"]=this.value; save(); };
}
function caseStatus(){
  /* dynamic required-field accounting that honours conditionals */
  var total=0, done=0, a=state.answers;
  SURVEY_DATA.forEach(function(q){
    q.responses.forEach(function(r){
      var p="q"+q.num+"_"+r.letter+"_";
      var need=["accuracy","comprehensiveness","clarity","most_likely_dd_first","triage_conveyed","specialist_needed","harm_flag"];
      need.forEach(function(m){ total++; if(filled(a[p+m])) done++; });
      if(a[p+"specialist_needed"]==="Yes"){ total++; if(filled(a[p+"referral_mentioned"])) done++; }
    });
    total++; if(filled(a["q"+q.num+"_best"])) done++;   /* best_why is optional */
  });
  return {total:total, done:done};
}
function renderReview(){
  var st=caseStatus();
  var complete = (st.done===st.total);
  root.innerHTML =
    '<div class="card pad" style="max-width:680px">'
   +'<h2>Review &amp; submit</h2>'
   +'<p class="muted">Required items completed: <span class="pill-ok">'+st.done+' / '+st.total+'</span></p>'
   +(complete? '' : '<div class="banner-warn">Some required items are still blank. Use <b>Back</b> to complete them — the count above will reach 100%.</div>')
   +'<p class="muted" style="font-size:13.5px;margin-top:14px">Grader: <b>'+esc(state.graderId)+'</b> &middot; '+esc(state.email)+'</p>'
   +'<button class="btn btn-primary" id="submitBtn" style="width:100%;margin-top:8px" '+(complete?'':'disabled')+'>Submit my scores</button>'
   +'<button class="btn btn-ghost" id="dlBtn" style="width:100%;margin-top:10px">Download a copy of my answers (backup)</button>'
   +'<div id="subMsg" style="margin-top:14px;font-size:14px"></div>'
   +'</div>';
  document.getElementById("dlBtn").onclick=downloadBackup;
  var sb=document.getElementById("submitBtn"); if(sb) sb.onclick=submitAll;
  if(state.submitted){
    if(sb){ sb.disabled=true; sb.textContent="Already submitted"; }
    document.getElementById("subMsg").innerHTML='<span class="pill-ok">Your scores were already recorded. Thank you — you may close this tab.</span>';
  }
}
/* ============ WIDGETS ============ */
function scaleHTML(field,q,lo,hi,a,help){
  var sel=a[field], b="";
  for(var i=1;i<=10;i++){ b+='<button type="button" data-v="'+i+'" aria-pressed="'+(String(sel)===String(i))+'">'+i+'</button>'; }
  return '<div class="metric" data-field="'+field+'"><div class="m-q">'+q+'</div>'
    +(help?'<div class="m-help">'+help+'</div>':'')
    +'<div class="scale">'+b+'</div>'
    +'<div class="scale-ends"><span>1 · '+lo+'</span><span>'+hi+' · 10</span></div></div>';
}
function choiceInner(field,q,opts,a,kind){
  var sel=a[field], b="";
  opts.forEach(function(o){ b+='<button type="button" data-v="'+esc(o)+'" aria-pressed="'+(sel===o)+'">'+esc(o)+'</button>'; });
  return (q?'<div class="m-q">'+q+'</div>':'')+'<div class="choices '+(kind||"")+'" data-choices="'+field+'">'+b+'</div>';
}
function choiceHTML(field,q,opts,a,kind,help){
  return '<div class="metric" data-field="'+field+'">'
    + (q?'<div class="m-q">'+q+'</div>':'')
    + (help?'<div class="m-help">'+help+'</div>':'')
    + '<div class="choices '+(kind||"")+'" data-choices="'+field+'">'
    + opts.map(function(o){ return '<button type="button" data-v="'+esc(o)+'" aria-pressed="'+(a[field]===o)+'">'+esc(o)+'</button>'; }).join('')
    + '</div></div>';
}
function wireScale(field){
  var box=document.querySelector('[data-field="'+field+'"] .scale'); if(!box) return;
  box.querySelectorAll("button").forEach(function(btn){
    btn.onclick=function(){
      state.answers[field]=btn.getAttribute("data-v");
      box.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-pressed", x===btn);});
      save();
    };
  });
}
function wireChoice(field,cb){
  var box=document.querySelector('[data-choices="'+field+'"]'); if(!box) return;
  box.querySelectorAll("button").forEach(function(btn){
    btn.onclick=function(){
      var v=btn.getAttribute("data-v");
      state.answers[field]=v;
      box.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-pressed", x===btn);});
      save(); if(cb) cb(v);
    };
  });
}
function wireBestChoice(field, step){
  var box=document.querySelector('[data-choices="'+field+'"]'); if(!box) return;
  var q = SURVEY_DATA.filter(function(x){ return x.num===step.q; })[0];
  var htmlByLetter = {};
  if(q){ q.responses.forEach(function(r){ htmlByLetter[r.letter]=r.html || esc(r.text||""); }); }
  box.querySelectorAll("button").forEach(function(btn){
    btn.onclick=function(){
      var v=btn.getAttribute("data-v");
      if(state.answers[field]===v) return;   /* already chosen, no re-confirm */
      var letter=v.replace("Chatbot ","");
      var body = '<p style="margin:0">You picked <b>Chatbot '+letter+'</b>. Please re-read its full response below to make sure it is the one you meant, then confirm.</p>'
        + '<div class="modal-resp resp-content">'+(htmlByLetter[letter]||"(response unavailable)")+'</div>';
      showConfirm(body, function(){
        state.answers[field]=v;
        box.querySelectorAll("button").forEach(function(x){x.setAttribute("aria-pressed", x===btn);});
        save();
      });
    };
  });
}
function refreshPressed(field){
  var box=document.querySelector('[data-choices="'+field+'"]'); if(!box) return;
  box.querySelectorAll("button").forEach(function(x){ x.setAttribute("aria-pressed", state.answers[field]===x.getAttribute("data-v")); });
}
/* ============ MODAL ============ */
function showConfirm(bodyHtml, onOk){
  var ov=document.getElementById("modal");
  document.getElementById("modalBody").innerHTML=bodyHtml;
  ov.style.display="flex";
  var ok=document.getElementById("modalOk"), cancel=document.getElementById("modalCancel");
  function close(){ ov.style.display="none"; ok.onclick=null; cancel.onclick=null; }
  ok.onclick=function(){ close(); if(onOk) onOk(); };
  cancel.onclick=function(){ close(); };
}
/* ============ NAV ============ */
function validateCurrent(){
  var step=steps[state.idx], a=state.answers;
  if(step.type==="rate"){
    var p="q"+step.q+"_"+step.letter+"_";
    var need=["accuracy","comprehensiveness","clarity","most_likely_dd_first","triage_conveyed","specialist_needed","harm_flag"];
    for(var i=0;i<need.length;i++){ if(!filled(a[p+need[i]])) return "Please answer all items before continuing."; }
    if(a[p+"specialist_needed"]==="Yes" && !filled(a[p+"referral_mentioned"])) return "Please answer whether this response recommended a specialist referral.";
  }
  if(step.type==="best"){ if(!filled(a["q"+step.q+"_best"])) return "Please choose the response you liked most."; }
  return null;
}
nextBtn.onclick=function(){
  var err=validateCurrent();
  if(err){ alert(err); return; }
  if(state.idx<steps.length-1){ state.idx++; save(); render(); scrollTop(); }
};
backBtn.onclick=function(){ if(state.idx>1){ state.idx--; save(); render(); scrollTop(); } };
function scrollTop(){ window.scrollTo({top:0,behavior:"smooth"}); }
/* ============ SUBMIT ============ */
function canonicalOrder(){
  var order=["graderId","email","submittedAt"];
  SURVEY_DATA.forEach(function(q){
    ["A","B","C"].forEach(function(L){
      ["accuracy","comprehensiveness","clarity","most_likely_dd_first","triage_conveyed","specialist_needed","referral_mentioned","harm_flag"].forEach(function(m){ order.push("q"+q.num+"_"+L+"_"+m); });
    });
    order.push("q"+q.num+"_best","q"+q.num+"_best_why");
  });
  order.push("global_notes","time_spent_minutes");
  return order;
}
function buildPayload(){
  var rec={graderId:state.graderId, email:state.email, submittedAt:new Date().toISOString()};
  Object.keys(state.answers).forEach(function(k){ rec[k]=state.answers[k]; });
  return {order:canonicalOrder(), record:rec};
}
function submitAll(){
  var msg=document.getElementById("subMsg");
  var btn=document.getElementById("submitBtn");
  if(state.submitted){ msg.innerHTML='<span class="pill-ok">Your scores were already recorded. There is no need to submit again.</span>'; return; }
  if(state.sending){ return; }
  var payload=buildPayload();
  if(SUBMIT_URL.indexOf("PASTE_")===0){
    msg.innerHTML='<span style="color:var(--accent)">The submission URL has not been set yet. Your answers are saved in this browser; please use the backup download. (Study team: set SUBMIT_URL.)</span>';
    return;
  }
  state.sending=true; if(btn){btn.disabled=true;} msg.innerHTML="Submitting…";
  fetch(SUBMIT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)})
   .then(function(){
      state.submitted=true; state.sending=false; save();
      if(btn){btn.textContent="Already submitted";}
      msg.innerHTML='<span class="pill-ok">Thank you. Your scores have been recorded.</span> Please do not discuss your scores with other graders. You may keep a backup copy below.';
   })
   .catch(function(){
      state.sending=false; if(btn){btn.disabled=false;}
      msg.innerHTML='<span style="color:var(--accent)">Submission could not be confirmed. Please use the backup download and send the file to the study team.</span>';
   });
}
function downloadBackup(){
  var payload=buildPayload();
  var blob=new Blob([JSON.stringify(payload.record,null,2)],{type:"application/json"});
  var u=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=u; a.download="vetai_grading_"+(state.graderId||"grader").replace(/[^a-z0-9]/gi,"_")+".json"; a.click();
  URL.revokeObjectURL(u);
}
/* ============ UTIL ============ */
function filled(v){ return v!=null && v!==""; }
function valOf(id){ var el=document.getElementById(id); return el?el.value.trim():""; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

wireTextSize();
wireSaveButton();
applyTextScale();
render();
</script>
